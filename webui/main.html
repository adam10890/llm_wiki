<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Wiki — Dashboard</title>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --info:#818cf8;
      --bg0:#0a0f14; --bg1:#111820; --bg2:#18222d;
      --border:#1e2d3d; --text:#a8b5c4; --bright:#e8eef5;
      --accent:#22c55e; --accent2:#818cf8;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg0);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;min-height:100vh;padding:20px;}
    .wk-hero{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px;background:linear-gradient(180deg,#0d1820 0%,var(--bg0) 100%);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;}
    .wk-hero h1{font-size:20px;color:var(--bright);font-weight:700;letter-spacing:-.3px;}
    .wk-hero-sub{font-size:11px;color:#5a7080;margin-top:4px;}
    .wk-hero-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-size:10px;}
    .wk-pill{padding:3px 10px;border-radius:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-size:9px;}
    .wk-pill.ok{background:rgba(34,197,94,.15);color:var(--ok);border:1px solid rgba(34,197,94,.3);}
    .wk-pill.err{background:rgba(239,68,68,.12);color:var(--err);border:1px solid rgba(239,68,68,.3);}
    .wk-pill.warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.3);}

    .wk-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
    .wk-stat{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
    .wk-stat-label{font-size:10px;color:#5a7080;text-transform:uppercase;letter-spacing:1.5px;}
    .wk-stat-value{font-size:26px;color:var(--bright);font-weight:700;margin-top:4px;}
    .wk-stat-value.ok{color:var(--ok);}
    .wk-stat-value.warn{color:var(--warn);}
    .wk-stat-value.err{color:var(--err);}

    .wk-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;}
    @media (max-width:900px){.wk-grid{grid-template-columns:1fr;}}

    .wk-card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .wk-card-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2);}
    .wk-card-title{font-size:11px;font-weight:700;color:var(--bright);letter-spacing:1.5px;text-transform:uppercase;}
    .wk-card-count{font-size:10px;color:#5a7080;}
    .wk-card-body{padding:8px 12px;}

    .wk-wiki-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;padding:9px 10px;border-radius:5px;margin-bottom:4px;background:var(--bg0);border:1px solid var(--border);}
    .wk-wiki-dot{width:8px;height:8px;border-radius:50%;}
    .wk-wiki-dot.exists{background:var(--ok);box-shadow:0 0 6px rgba(34,197,94,.4);}
    .wk-wiki-dot.missing{background:var(--err);box-shadow:0 0 6px rgba(239,68,68,.4);}
    .wk-wiki-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
    .wk-wiki-name{font-size:12px;color:var(--bright);font-weight:600;}
    .wk-wiki-name .star{color:var(--warn);margin-left:4px;}
    .wk-wiki-meta{font-size:10px;color:#5a7080;}
    .wk-wiki-meta .sep{margin:0 5px;opacity:.4;}
    .wk-wiki-pages{font-size:11px;color:var(--accent2);font-weight:600;}
    .wk-wiki-perms{display:flex;gap:3px;}
    .wk-perm{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;}
    .wk-perm.r{background:rgba(129,140,248,.12);color:var(--accent2);}
    .wk-perm.w{background:rgba(34,197,94,.12);color:var(--accent);}
    .wk-perm.x{background:rgba(84,110,122,.08);color:#546e7a;}

    .wk-git-row{display:flex;gap:8px;align-items:flex-start;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;}
    .wk-git-row:last-child{border-bottom:0;}
    .wk-git-sha{font-family:'JetBrains Mono','Consolas',monospace;color:var(--warn);font-size:10px;flex-shrink:0;padding-top:2px;}
    .wk-git-subject{color:var(--bright);word-break:break-word;}
    .wk-git-meta{font-size:9px;color:#5a7080;margin-top:2px;}

    .wk-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .wk-btn{background:var(--bg1);color:var(--bright);border:1px solid var(--border);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .18s ease;}
    .wk-btn:hover{border-color:var(--accent2);background:var(--bg2);color:var(--accent2);}
    .wk-btn:disabled{opacity:.5;cursor:not-allowed;}

    .wk-empty{text-align:center;padding:30px;color:#546e7a;font-size:11px;}
    .wk-err{padding:14px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#ff8a80;font-size:12px;margin-bottom:20px;}

    .wk-grants{font-size:10px;color:#5a7080;margin-top:10px;line-height:1.5;}
    .wk-grants strong{color:var(--bright);font-weight:600;}
    .wk-grants code{background:var(--bg0);padding:1px 5px;border-radius:3px;color:var(--accent2);font-size:10px;}
  </style>
</head>
<body>

<div x-data="wikiDashboard()" x-init="init()">

  <div class="wk-hero">
    <div>
      <h1>LLM Wiki — SharedBrain Dashboard</h1>
      <div class="wk-hero-sub" x-text="status.configured ? status.vault_root : 'Vault not configured'"></div>
      <div class="wk-grants" x-show="status.configured">
        <strong x-text="status.agent_id"></strong> ·
        read: <template x-for="w in status.grants.read" :key="w"><code x-text="w"></code></template>
        <span x-show="!status.grants.read.length">(none)</span>
        · write: <template x-for="w in status.grants.write" :key="w"><code x-text="w"></code></template>
        <span x-show="!status.grants.write.length">(none)</span>
      </div>
    </div>
    <div class="wk-hero-meta">
      <span class="wk-pill" :class="health"
            x-text="loading ? 'LOADING' : (status.ok ? 'HEALTHY' : (status.configured ? 'DEGRADED' : 'OFFLINE'))"></span>
      <span x-text="'v' + version"></span>
      <span x-text="lastRefreshed ? 'Updated ' + lastRefreshed : ''"></span>
    </div>
  </div>

  <template x-if="status.error">
    <div class="wk-err" x-text="status.error"></div>
  </template>

  <div class="wk-actions">
    <button class="wk-btn" @click="refresh(true)" :disabled="loading">↻ Refresh</button>
    <button class="wk-btn" @click="copySummary()">⧉ Copy summary</button>
  </div>

  <div class="wk-stats" x-show="status.configured">
    <div class="wk-stat">
      <div class="wk-stat-label">Total wikis</div>
      <div class="wk-stat-value" x-text="status.stats.total"></div>
    </div>
    <div class="wk-stat">
      <div class="wk-stat-label">Readable</div>
      <div class="wk-stat-value ok" x-text="status.stats.readable"></div>
    </div>
    <div class="wk-stat">
      <div class="wk-stat-label">Writable</div>
      <div class="wk-stat-value ok" x-text="status.stats.writable"></div>
    </div>
    <div class="wk-stat">
      <div class="wk-stat-label">Total pages</div>
      <div class="wk-stat-value" x-text="status.stats.total_pages"></div>
    </div>
    <div class="wk-stat">
      <div class="wk-stat-label">Missing</div>
      <div class="wk-stat-value" :class="status.stats.missing ? 'err' : 'ok'" x-text="status.stats.missing"></div>
    </div>
    <div class="wk-stat">
      <div class="wk-stat-label">Git repo</div>
      <div class="wk-stat-value" :class="status.git.is_repo ? 'ok' : 'warn'"
           x-text="status.git.is_repo ? 'YES' : 'NO'"></div>
    </div>
  </div>

  <div class="wk-grid" x-show="status.configured">
    <div class="wk-card">
      <div class="wk-card-hdr">
        <div class="wk-card-title">Wikis</div>
        <div class="wk-card-count" x-text="status.wikis.length + ' entries'"></div>
      </div>
      <div class="wk-card-body">
        <template x-for="w in status.wikis" :key="w.name">
          <div class="wk-wiki-row">
            <div class="wk-wiki-dot" :class="w.exists ? 'exists' : 'missing'"></div>
            <div class="wk-wiki-info">
              <div class="wk-wiki-name">
                <span x-text="w.name"></span>
                <span class="star" x-show="w.default" title="Default ingest target">★</span>
              </div>
              <div class="wk-wiki-meta">
                <span x-text="w.scope"></span>
                <span class="sep">·</span>
                <span x-text="w.sensitivity"></span>
                <template x-if="w.last_log_entry">
                  <span>
                    <span class="sep">·</span>
                    <span x-text="truncate(w.last_log_entry, 50)"></span>
                  </span>
                </template>
              </div>
            </div>
            <div class="wk-wiki-pages" x-text="w.pages + ' pgs'"></div>
            <div class="wk-wiki-perms">
              <span class="wk-perm" :class="w.can_read ? 'r' : 'x'" x-text="w.can_read ? 'R' : '-'"></span>
              <span class="wk-perm" :class="w.can_write ? 'w' : 'x'" x-text="w.can_write ? 'W' : '-'"></span>
            </div>
          </div>
        </template>
        <div class="wk-empty" x-show="!status.wikis.length">No wikis registered.</div>
      </div>
    </div>

    <div class="wk-card">
      <div class="wk-card-hdr">
        <div class="wk-card-title">Recent commits</div>
        <div class="wk-card-count" x-text="(status.git.log || []).length + ' shown'"></div>
      </div>
      <div class="wk-card-body">
        <template x-for="c in status.git.log" :key="c.sha">
          <div class="wk-git-row">
            <span class="wk-git-sha" x-text="c.short"></span>
            <div style="flex:1;min-width:0;">
              <div class="wk-git-subject" x-text="c.subject"></div>
              <div class="wk-git-meta">
                <span x-text="c.author"></span>
                ·
                <span x-text="formatDate(c.date)"></span>
              </div>
            </div>
          </div>
        </template>
        <div class="wk-empty" x-show="!status.git.is_repo">
          Vault is not a git repo.<br>
          <span style="font-size:10px;opacity:.6;">Run <code>git init</code> in the vault root to enable the audit trail.</span>
        </div>
        <div class="wk-empty" x-show="status.git.is_repo && !(status.git.log || []).length">
          No commits yet.
        </div>
      </div>
    </div>
  </div>

  <div class="wk-empty" x-show="!status.configured && !loading && !status.error">
    Loading vault status…
  </div>

</div>

<script>
function wikiDashboard() {
  return {
    version: '2.2.0',
    loading: true,
    lastRefreshed: '',
    status: {
      ok: false, configured: false, error: null,
      vault_root: '', agent_id: 'agent_zero',
      grants: { read: [], write: [] },
      stats: { total: 0, readable: 0, writable: 0, total_pages: 0, missing: 0 },
      git: { is_repo: false, auto_commit: false, log: [] },
      wikis: [],
    },
    get health() {
      if (this.loading) return 'warn';
      if (!this.status.configured) return 'err';
      return this.status.ok ? 'ok' : 'warn';
    },
    async init() {
      await this.refresh(false);
      // Auto-refresh every 30s in case the agent or user edits wikis
      setInterval(() => this.refresh(false), 30000);
    },
    async refresh(force) {
      this.loading = true;
      try {
        const url = '/plugins/llm_wiki/wiki_status';
        const resp = await (typeof callJsonApi === 'function'
          ? callJsonApi(url, { refresh: !!force })
          : (await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ refresh: !!force }),
            })).json());
        if (resp && resp.success && resp.status) {
          this.status = resp.status;
        } else {
          this.status.error = (resp && resp.error) || 'unknown error';
          this.status.ok = false;
        }
      } catch (e) {
        this.status.error = 'request failed: ' + (e && e.message ? e.message : e);
        this.status.ok = false;
      } finally {
        this.loading = false;
        this.lastRefreshed = new Date().toLocaleTimeString();
      }
    },
    truncate(s, n) {
      if (!s) return '';
      return s.length <= n ? s : s.slice(0, n - 1) + '…';
    },
    formatDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleString();
      } catch (e) {
        return iso;
      }
    },
    copySummary() {
      const lines = [
        `LLM Wiki — ${this.status.vault_root}`,
        `Agent: ${this.status.agent_id}`,
        `Stats: ${this.status.stats.total} wikis, ${this.status.stats.readable}R/${this.status.stats.writable}W, ${this.status.stats.total_pages} pages`,
        '',
        ...this.status.wikis.map(w =>
          `  ${w.exists ? '✓' : '✗'} ${w.name.padEnd(20)} ${w.pages} pgs  [${w.can_read ? 'R' : '-'}${w.can_write ? 'W' : '-'}]  ${w.scope}/${w.sensitivity}`
        ),
      ];
      const text = lines.join('\n');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
      }
    },
  };
}
window.wikiDashboard = wikiDashboard;
</script>
</body>
</html>
